<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VendorBridge ERP - Procurement & Vendor Management</title>
  
  <!-- Roboto Font from Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  <!-- Chart.js from CDN -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    /* CSS VARIABLES - ODOO-MATCHING COLOR SYSTEM */
    :root {
      --primary-purple: #875A7B;
      --primary-dark: #71456B;
      --white: #FFFFFF;
      --sidebar-bg: #2C3E50;
      --sidebar-text: #ECEFF1;
      --sidebar-active: #875A7B;
      --body-bg: #F4F5F7;
      --card-white: #FFFFFF;
      --border-color: #D0D0D0;
      --success-green: #28A745;
      --warning-orange: #F0AD4E;
      --danger-red: #DC3545;
      --info-blue: #17A2B8;
      --text-dark: #212529;
      --text-muted: #6C757D;
      
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.12), 0 1px 2px rgba(0,0,0,0.24);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --transition-speed: 0.2s;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background-color: var(--body-bg);
      color: var(--text-dark);
      line-height: 1.5;
      overflow-x: hidden;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* SCROLLBAR STYLING */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #c1c1c1;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #a8a8a8;
    }

    /* UTILITY CLASSES */
    .text-center { text-align: center; }
    .d-none { display: none !important; }
    .badge {
      display: inline-block;
      padding: 0.25em 0.6em;
      font-size: 75%;
      font-weight: 700;
      line-height: 1;
      text-align: center;
      white-space: nowrap;
      vertical-align: baseline;
      border-radius: 10rem;
    }
    .badge-success { background-color: var(--success-green); color: white; }
    .badge-warning { background-color: var(--warning-orange); color: white; }
    .badge-danger { background-color: var(--danger-red); color: white; }
    .badge-info { background-color: var(--info-blue); color: white; }
    .badge-secondary { background-color: var(--text-muted); color: white; }

    /* BUTTONS */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-weight: 500;
      text-align: center;
      vertical-align: middle;
      user-select: none;
      border: 1px solid transparent;
      padding: 0.375rem 0.75rem;
      font-size: 0.9rem;
      border-radius: 4px;
      cursor: pointer;
      transition: background-color var(--transition-speed), border-color var(--transition-speed), transform var(--transition-speed);
      gap: 0.5rem;
    }
    .btn:active {
      transform: scale(0.98);
    }
    .btn-primary { background-color: var(--primary-purple); color: white; }
    .btn-primary:hover { background-color: var(--primary-dark); }
    .btn-success { background-color: var(--success-green); color: white; }
    .btn-success:hover { background-color: #218838; }
    .btn-danger { background-color: var(--danger-red); color: white; }
    .btn-danger:hover { background-color: #c82333; }
    .btn-secondary { background-color: var(--text-muted); color: white; }
    .btn-secondary:hover { background-color: #5a6268; }
    .btn-outline { background-color: transparent; border-color: var(--border-color); color: var(--text-dark); }
    .btn-outline:hover { background-color: #e9ecef; }
    .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

    /* LAYOUT SHIELD FOR LOGIN */
    .auth-container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    .auth-sidebar {
      flex: 1;
      background: linear-gradient(135deg, var(--primary-purple) 0%, var(--primary-dark) 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      padding: 3rem;
      position: relative;
      overflow: hidden;
    }

    .auth-sidebar::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255,255,255,0.05) 10%, transparent 10.1%);
      background-size: 40px 40px;
      top: -50%;
      left: -50%;
      animation: rotateBg 180s linear infinite;
    }

    @keyframes rotateBg {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .auth-logo-section {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .auth-logo-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.3));
    }

    .auth-sidebar h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 4px rgba(0,0,0,0.2);
    }

    .auth-sidebar p {
      font-size: 1.1rem;
      opacity: 0.9;
      max-width: 400px;
    }

    .auth-content {
      flex: 1;
      background-color: var(--white);
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem;
      max-width: 550px;
      box-shadow: -5px 0 25px rgba(0,0,0,0.05);
    }

    .auth-form-wrapper {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }

    .auth-title {
      font-size: 2rem;
      font-weight: 700;
      color: var(--primary-purple);
      margin-bottom: 0.5rem;
    }

    .auth-subtitle {
      color: var(--text-muted);
      margin-bottom: 2rem;
    }

    /* FORMS */
    .form-group {
      margin-bottom: 1.25rem;
      position: relative;
    }

    .form-label {
      display: block;
      font-weight: 500;
      font-size: 0.85rem;
      margin-bottom: 0.4rem;
      color: var(--text-dark);
    }

    .form-label .required {
      color: var(--danger-red);
      margin-left: 2px;
    }

    .input-group {
      position: relative;
    }

    .form-control {
      width: 100%;
      padding: 0.6rem 0.75rem;
      font-size: 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      background-color: var(--white);
      color: var(--text-dark);
      transition: border-color var(--transition-speed), box-shadow var(--transition-speed);
    }

    .form-control:focus {
      outline: none;
      border-color: var(--primary-purple);
      box-shadow: 0 0 0 3px rgba(135, 90, 123, 0.15);
    }

    .input-icon-left {
      padding-left: 2.25rem;
    }

    .input-icon {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
      display: flex;
      align-items: center;
    }

    .password-toggle {
      position: absolute;
      right: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
    }

    .form-error {
      color: var(--danger-red);
      font-size: 0.75rem;
      margin-top: 0.25rem;
      display: none;
    }

    .form-checkbox-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      font-size: 0.85rem;
    }

    .form-checkbox-label {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .auth-link {
      color: var(--primary-purple);
      font-weight: 500;
      cursor: pointer;
    }

    .auth-link:hover {
      text-decoration: underline;
    }

    /* TOAST NOTIFICATIONS */
    #toast-container {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      pointer-events: none;
    }

    .toast {
      pointer-events: auto;
      min-width: 300px;
      max-width: 400px;
      padding: 1rem;
      border-radius: 4px;
      box-shadow: var(--shadow-lg);
      color: white;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transform: translateX(120%);
      transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
      position: relative;
      overflow: hidden;
    }

    .toast.show {
      transform: translateX(0);
    }

    .toast-success { background-color: var(--success-green); }
    .toast-error { background-color: var(--danger-red); }
    .toast-warning { background-color: var(--warning-orange); }
    .toast-info { background-color: var(--info-blue); }

    .toast-icon {
      font-size: 1.25rem;
      display: flex;
      align-items: center;
    }

    .toast-body {
      flex: 1;
      font-size: 0.85rem;
    }

    .toast-close {
      cursor: pointer;
      opacity: 0.7;
      transition: opacity var(--transition-speed);
      font-size: 1rem;
    }

    .toast-close:hover { opacity: 1; }

    /* ERP DASHBOARD LAYOUT */
    .erp-container {
      display: grid;
      grid-template-columns: 240px 1fr;
      grid-template-rows: 60px 1fr;
      height: 100vh;
      width: 100vw;
    }

    /* SIDEBAR */
    .sidebar {
      grid-row: 1 / 3;
      background-color: var(--sidebar-bg);
      color: var(--sidebar-text);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      transition: transform 0.3s ease;
      z-index: 100;
    }

    .sidebar-header {
      height: 60px;
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      background-color: rgba(0,0,0,0.15);
      gap: 0.75rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .sidebar-logo {
      font-size: 1.25rem;
      font-weight: 700;
      color: white;
      letter-spacing: 0.5px;
    }

    .sidebar-user {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 0.5rem;
    }

    .sidebar-avatar {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background-color: var(--primary-purple);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5rem;
      font-weight: 700;
      border: 3px solid rgba(255,255,255,0.1);
    }

    .sidebar-username {
      font-weight: 500;
      font-size: 0.95rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .sidebar-role-badge {
      font-size: 0.7rem;
      padding: 0.15rem 0.5rem;
      background-color: rgba(255,255,255,0.1);
      border-radius: 10px;
    }

    .sidebar-menu {
      list-style: none;
      padding: 1rem 0;
      flex: 1;
    }

    .sidebar-menu-item {
      margin: 0.2rem 0.75rem;
    }

    .sidebar-menu-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.65rem 1rem;
      border-radius: 4px;
      font-size: 0.9rem;
      color: var(--sidebar-text);
      opacity: 0.8;
      transition: background-color var(--transition-speed), opacity var(--transition-speed);
      cursor: pointer;
    }

    .sidebar-menu-link:hover {
      background-color: rgba(255,255,255,0.05);
      opacity: 1;
    }

    .sidebar-menu-item.active .sidebar-menu-link {
      background-color: var(--sidebar-active);
      color: white;
      opacity: 1;
      font-weight: 500;
    }

    .sidebar-menu-icon {
      font-size: 1.1rem;
      width: 20px;
      text-align: center;
    }

    /* TOP NAVBAR */
    .navbar {
      background-color: var(--white);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .navbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .hamburger-menu {
      display: none;
      font-size: 1.5rem;
      cursor: pointer;
      color: var(--text-dark);
    }

    .navbar-title {
      font-size: 1.25rem;
      font-weight: 500;
      color: var(--primary-purple);
    }

    .navbar-right {
      display: flex;
      align-items: center;
      gap: 1.5rem;
    }

    .nav-icon-btn {
      font-size: 1.25rem;
      color: var(--text-muted);
      cursor: pointer;
      position: relative;
      transition: color var(--transition-speed);
      background: none;
      border: none;
      display: flex;
      align-items: center;
    }

    .nav-icon-btn:hover {
      color: var(--primary-purple);
    }

    .nav-badge {
      position: absolute;
      top: -5px;
      right: -8px;
      font-size: 0.65rem;
      background-color: var(--danger-red);
      color: white;
      border-radius: 50%;
      width: 16px;
      height: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
    }

    .nav-user-dropdown {
      position: relative;
    }

    .nav-user-trigger {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
    }

    .nav-avatar-mini {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background-color: var(--primary-purple);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 0.85rem;
    }

    .nav-username-mini {
      font-size: 0.85rem;
      font-weight: 500;
      max-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .dropdown-menu {
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 0.5rem;
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 4px;
      box-shadow: var(--shadow-lg);
      list-style: none;
      min-width: 150px;
      z-index: 1000;
      display: none;
    }

    .dropdown-menu.show {
      display: block;
    }

    .dropdown-item {
      padding: 0.6rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: background-color var(--transition-speed);
    }

    .dropdown-item:hover {
      background-color: #f8f9fa;
      color: var(--primary-purple);
    }

    .dropdown-divider {
      height: 1px;
      background-color: var(--border-color);
      margin: 0.25rem 0;
    }

    /* MAIN CONTENT */
    .main-content {
      overflow-y: auto;
      padding: 1.5rem;
    }

    /* CARDS */
    .card {
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .card-header {
      padding: 1rem 1.5rem;
      background-color: var(--white);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--primary-purple);
    }

    .card-body {
      padding: 1.5rem;
    }

    /* DASHBOARD CONTENT SPECIFIC */
    .stat-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    .stat-card {
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow-sm);
    }

    .stat-card-left {
      display: flex;
      flex-direction: column;
    }

    .stat-card-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-card-value {
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--text-dark);
      margin-top: 0.25rem;
    }

    .stat-card-icon {
      font-size: 2.25rem;
      opacity: 0.85;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }

    .icon-blue { background-color: rgba(23, 162, 184, 0.1); color: var(--info-blue); }
    .icon-orange { background-color: rgba(240, 173, 78, 0.1); color: var(--warning-orange); }
    .icon-green { background-color: rgba(40, 167, 69, 0.1); color: var(--success-green); }
    .icon-purple { background-color: rgba(135, 90, 123, 0.1); color: var(--primary-purple); }

    .dashboard-grid {
      display: grid;
      grid-template-columns: 3fr 2fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .quick-actions-row {
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .quick-actions-title {
      font-weight: 700;
      color: var(--text-dark);
      font-size: 0.9rem;
      margin-right: 0.5rem;
    }

    /* TABLES */
    .table-responsive {
      width: 100%;
      overflow-x: auto;
    }

    .table-container {
      background-color: var(--white);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      overflow: hidden;
      box-shadow: var(--shadow-sm);
    }

    .table-header-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem;
      background-color: #f8f9fa;
      border-bottom: 1px solid var(--border-color);
      flex-wrap: wrap;
      gap: 1rem;
    }

    .table-search-box {
      position: relative;
      width: 250px;
    }

    .table-search-input {
      padding-left: 2rem;
    }

    .table-filters {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }

    .custom-table {
      width: 100%;
      border-collapse: collapse;
      text-align: left;
      font-size: 0.88rem;
    }

    .custom-table th {
      background-color: #f8f9fa;
      color: var(--text-dark);
      font-weight: 700;
      padding: 0.75rem 1rem;
      border-bottom: 2px solid var(--border-color);
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
      position: relative;
    }

    .custom-table th:hover {
      background-color: #e9ecef;
    }

    .custom-table th .sort-icon {
      font-size: 0.7rem;
      margin-left: 0.25rem;
      opacity: 0.5;
    }

    .custom-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #e9ecef;
      vertical-align: middle;
      color: var(--text-dark);
    }

    .custom-table tbody tr:nth-of-type(even) {
      background-color: #f8f9fa;
    }

    .custom-table tbody tr:hover {
      background-color: #F3EDF7;
    }

    .actions-cell {
      display: flex;
      gap: 0.35rem;
      flex-wrap: nowrap;
    }

    /* PAGINATION */
    .pagination-container {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1rem;
      background-color: #f8f9fa;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .pagination-buttons {
      display: flex;
      gap: 0.25rem;
    }

    .page-btn {
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--border-color);
      background-color: var(--white);
      color: var(--text-dark);
      border-radius: 3px;
      cursor: pointer;
    }

    .page-btn:hover:not(:disabled) {
      background-color: #e9ecef;
      color: var(--primary-purple);
    }

    .page-btn.active {
      background-color: var(--primary-purple);
      color: white;
      border-color: var(--primary-purple);
    }

    .page-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* EMPTY STATE */
    .empty-state {
      padding: 3rem;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
      opacity: 0.5;
    }

    .empty-state-text {
      font-weight: 500;
      font-size: 1rem;
    }

    /* HIGHLIGHT MARK */
    mark.highlight {
      background-color: #fff3cd;
      padding: 0.1em 0.2em;
      border-radius: 2px;
      color: #856404;
    }

    /* MODAL SYSTEM */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: rgba(0, 0, 0, 0.5);
      z-index: 1050;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-speed);

    // HELPERS & STRING FORMATTERS

    function formatCurrency(amount) {
      return '₹' + Number(amount).toLocaleString('en-IN', { maximumFractionDigits: 2 });
    }

    function formatDate(date) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const d = new Date(date);
      const day = String(d.getDate()).padStart(2, '0');
      const month = months[d.getMonth()];
      const year = d.getFullYear();
      return `${day} ${month} ${year}`;
    }

    function formatDateTime(date) {
      const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
      const d = new Date(date);
      const day = String(d.getDate()).padStart(2, '0');
      const month = months[d.getMonth()];
      const year = d.getFullYear();
      const hour = String(d.getHours()).padStart(2, '0');
      const min = String(d.getMinutes()).padStart(2, '0');
      return `${day} ${month} ${year} ${hour}:${min}`;
    }

    function getInitials(name) {
      return name ? name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : 'US';

    // ----------------------------------------------------
    // TOAST SYSTEM
    // ----------------------------------------------------
    function showToast(message, type = 'success') {
      const container = document.getElementById('toast-container');
      if (!container) return;

      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;
      
      let icon = 'ℹ️';
      let autoDismiss = 3000;
      if (type === 'success') { icon = '✅'; autoDismiss = 3000; }
      else if (type === 'error') { icon = '❌'; autoDismiss = 4000; }
      else if (type === 'warning') { icon = '⚠️'; autoDismiss = 4000; }
      else if (type === 'info') { icon = 'ℹ️'; autoDismiss = 3000; }

      toast.innerHTML = `
        <span class="toast-icon">${icon}</span>
        <div class="toast-body">${message}</div>
        <span class="toast-close">&times;</span>
      `;

      container.appendChild(toast);
      
      // Force repaint to trigger CSS animation
      toast.offsetHeight;
      toast.classList.add('show');

      const dismiss = () => {
        toast.classList.remove('show');
        setTimeout(() => toast.remove(), 300);
      };

      const timer = setTimeout(dismiss, autoDismiss);

      toast.querySelector('.toast-close').addEventListener('click', () => {
        clearTimeout(timer);
        dismiss();
      });
    }

    // ----------------------------------------------------
    // ROUTING SYSTEM (SPA Hash Router)
    // ----------------------------------------------------
    const Router = {
      routes: {},
      add: (hash, renderFn, roles = []) => {
        Router.routes[hash] = { render: renderFn, roles };
      },
      navigate: (hash) => {
        window.location.hash = hash;
      },
      resolve: () => {
        const hash = window.location.hash || '#/dashboard';
        const session = DB.get('vb_session');

        // Close sidebar on mobile navigation automatically
        const sb = document.getElementById('sidebar');
        if (sb) sb.classList.remove('show');
        
        // Split out parameters (e.g. #/rfqs/compare?id=rfq1)
        const parts = hash.split('?');
        const path = parts[0];
        const params = {};
        if (parts[1]) {
          parts[1].split('&').forEach(p => {
            const kv = p.split('=');
            params[kv[0]] = decodeURIComponent(kv[1]);
          });
        }

        // Check public/private routes
        if (!session && path !== '#/login' && path !== '#/signup') {
          Router.navigate('#/login');
          return;
        }

        if (session && (path === '#/login' || path === '#/signup')) {
          Router.navigate('#/dashboard');
          return;
        }

        const route = Router.routes[path];
        if (route) {
          // Check role-based permission
          if (route.roles.length > 0 && !route.roles.includes(session.role)) {
            showToast('Access Denied: You do not have permissions for this page.', 'error');
            Router.navigate('#/dashboard');
            return;
          }
          route.render(params);
          if (session) {
            updateMailboxBadge();
          }
        } else {
          // Page not found or default
          Router.navigate('#/dashboard');
        }
      }
    };

    window.addEventListener('hashchange', Router.resolve);
    window.addEventListener('load', Router.resolve);

            const cell = cells[j];
            
            // Skip action cells or check badges
            if (cell.classList.contains('actions-cell')) continue;
            
            const originalHTML = cell.getAttribute('data-original-html') || cell.innerHTML;
            if (!cell.getAttribute('data-original-html')) {
              cell.setAttribute('data-original-html', originalHTML);
            }

            const text = cell.textContent;
            
            if (query && text.toLowerCase().includes(query)) {
              rowMatches = true;
              
              // We need a regex that replaces text outside of HTML tags to preserve badge shapes
              // Simple replacement for basic fields
              const escapedQuery = query.replace(/[-\/\\^$*+?.()|[\]{}]/g, '\\$&');
              const regex = new RegExp(`(${escapedQuery})`, 'gi');
              
              // If cell has inner tags (like a badge span), we highlight the text safely
              if (cell.querySelector('span')) {
                const badge = cell.querySelector('span');
                const badgeText = badge.textContent;
                if (badgeText.toLowerCase().includes(query)) {
                  badge.innerHTML = badgeText.replace(regex, `<mark class="highlight">$1</mark>`);
                } else {
                  badge.innerHTML = badgeText; // Reset
                }
              } else {
                cell.innerHTML = originalHTML.replace(regex, `<mark class="highlight">$1</mark>`);
              }
            } else {
              // Reset original
              cell.innerHTML = originalHTML;
            }
          }

          if (query) {
            row.style.display = rowMatches ? '' : 'none';
          } else {
            row.style.display = '';
          }
        }
      });
    }

    // Pagination Helper Class
    class TablePager {
      constructor(data, tbodyId, renderRowFn, itemsPerPage = 10) {
        this.data = data;
        this.tbodyId = tbodyId;
        this.renderRowFn = renderRowFn;
        this.itemsPerPage = itemsPerPage;
        this.currentPage = 1;
      }

      get totalPages() {
        return Math.max(1, Math.ceil(this.data.length / this.itemsPerPage));
      }

      updateData(newData) {
        this.data = newData;
        this.currentPage = 1;
        this.render();
      }

      render() {
        const tbody = document.getElementById(this.tbodyId);
        if (!tbody) return;

        tbody.innerHTML = '';
        if (this.data.length === 0) {
          tbody.innerHTML = `
            <tr>
              <td colspan="100" class="text-center text-muted" style="padding: 3rem 0;">
                <div style="font-size:2rem; margin-bottom: 0.5rem;">🔍</div>
                No records found.
              </td>
            </tr>
          `;
          this.renderControls(false);
          return;
        }

        const start = (this.currentPage - 1) * this.itemsPerPage;
        const end = Math.min(start + this.itemsPerPage, this.data.length);
        const paginatedData = this.data.slice(start, end);

        paginatedData.forEach((item, index) => {
          const rowHtml = this.renderRowFn(item, start + index + 1);
          const tr = document.createElement('tr');
          tr.innerHTML = rowHtml;
          tbody.appendChild(tr);
        });

        this.renderControls(true);
      }

      renderControls(visible) {
        const pagerId = this.tbodyId + '-pager';
        let pagerContainer = document.getElementById(pagerId);
        if (!pagerContainer) return;

        if (!visible) {
          pagerContainer.style.display = 'none';
          return;
        }

        pagerContainer.style.display = 'flex';
        const start = (this.currentPage - 1) * this.itemsPerPage + 1;
        const end = Math.min(start + this.itemsPerPage - 1, this.data.length);

        pagerContainer.innerHTML = `
          <div>Showing <b>${start}-${end}</b> of <b>${this.data.length}</b> entries</div>
          <div class="pagination-buttons">
            <button class="page-btn" id="${pagerId}-prev" ${this.currentPage === 1 ? 'disabled' : ''}>Prev</button>
            <span style="display:flex; align-items:center; padding: 0 0.5rem; font-weight:bold;">${this.currentPage} / ${this.totalPages}</span>
            <button class="page-btn" id="${pagerId}-next" ${this.currentPage === this.totalPages ? 'disabled' : ''}>Next</button>
          </div>
        `;

        document.getElementById(`${pagerId}-prev`).addEventListener('click', () => {
          if (this.currentPage > 1) {
            this.currentPage--;
            this.render();
          }
        });

        document.getElementById(`${pagerId}-next`).addEventListener('click', () => {
          if (this.currentPage < this.totalPages) {
            this.currentPage++;
            this.render();
          }
        });
      }
    }

    // Sort Table helper
    function setupTableSorting(tableId, data, pagerInstance, sortColumnsMapping) {
      const headers = document.querySelectorAll(`#${tableId} th[data-sort]`);
      let currentSort = { column: '', dir: 'asc' };

      headers.forEach(th => {
        // Add sorting indicator span if not present
        if (!th.querySelector('.sort-icon')) {
          const span = document.createElement('span');
          span.className = 'sort-icon';
          span.innerHTML = ' ▲▼';
          th.appendChild(span);
        }

        th.addEventListener('click', () => {
          const colKey = th.getAttribute('data-sort');
          let dir = 'asc';
          if (currentSort.column === colKey && currentSort.dir === 'asc') {
            dir = 'desc';
          }
          currentSort = { column: colKey, dir };

          // Reset other headers
          headers.forEach(h => h.querySelector('.sort-icon').innerHTML = ' ▲▼');
          th.querySelector('.sort-icon').innerHTML = dir === 'asc' ? ' ▲' : ' ▼';

          // Sort data
          const sorted = [...data].sort((a, b) => {
            let valA = a[colKey];
            let valB = b[colKey];
            
            // Handle custom resolve mapped keys
            if (sortColumnsMapping && sortColumnsMapping[colKey]) {
              valA = sortColumnsMapping[colKey](a);
              valB = sortColumnsMapping[colKey](b);
            }

            if (typeof valA === 'string') {
              return dir === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
            } else {
              return dir === 'asc' ? valA - valB : valB - valA;
            }
          });

          pagerInstance.updateData(sorted);
        });
      });
    }

      const vendors = DB.get('vb_vendors') || [];
      const v = vendors.find(item => item.id === id);

      if (confirm(`Are you sure you want to delete vendor "${v.name}"?\nThis action cannot be undone.`)) {
        const session = DB.get('vb_session');
        const list = vendors.filter(item => item.id !== id);
        DB.set('vb_vendors', list);
        DB.log(session.email, 'Vendor', `Deleted Vendor Registry: ${v.name}`);
        showToast('Vendor registry deleted successfully!', 'warning');
        renderVendors();
      }

      root.innerHTML = getLayoutWrapper(session.role === 'Vendor' ? 'RFQ Invitations' : 'Requests for Quotation (RFQs)', html);
      updateSidebarActive();

      // Setup Table Pager
      const renderRow = (r, index) => {
        // Find invited vendor names
        const invitedNames = r.invitedVendors.map(vid => {
          const ven = vendors.find(v => v.id === vid);
          return ven ? ven.name : 'Unknown';
        }).join(', ');

        const quotations = DB.get('vb_quotations') || [];
        const rfqQuotesCount = quotations.filter(q => q.rfqId === r.id).length;

        // Custom action columns depending on role
        let actions = ``;
        if (session.role === 'Vendor') {
          const quotes = DB.get('vb_quotations') || [];
          const hasQuote = quotes.find(q => q.rfqId === r.id && q.vendorId === vendorEntity.id);
          const isDeadlinePassed = new Date(r.deadline) < new Date();
          
          if (hasQuote) {
            actions = `<button class="btn btn-secondary btn-sm" onclick="editQuotation('${hasQuote.id}')" ${isDeadlinePassed ? 'disabled' : ''}>✏️ Edit Quote</button>`;
          } else {
            actions = `<button class="btn btn-success btn-sm" onclick="submitQuotationForm('${r.id}')" ${isDeadlinePassed ? 'disabled' : ''}>💬 Submit Quote</button>`;
          }
        } else {
          // Officer or Admin
          actions = `
            <button class="btn btn-outline btn-sm" onclick="viewRFQDetails('${r.id}')">👁 View</button>
            ${r.status === 'Draft' ? `
              <button class="btn btn-outline btn-sm" onclick="editRFQDetails('${r.id}')">✏️ Edit</button>
              <button class="btn btn-danger btn-sm" onclick="deleteRFQ('${r.id}')">🗑 Delete</button>
            ` : ''}
            ${rfqQuotesCount >= 2 ? `
              <button class="btn btn-primary btn-sm" onclick="Router.navigate('#/rfqs/compare?id=${r.id}')">📊 Compare Quotes</button>
            ` : ''}
          `;
        }

        return `
          <td><b>${r.rfqNumber}</b></td>
          <td>${r.title}</td>
          <td>${r.createdBy}</td>
          <td>${r.deadline}</td>
          <td><span style="font-size:0.75rem;" title="${invitedNames}">${invitedNames.length > 25 ? invitedNames.substr(0, 25) + '...' : invitedNames}</span></td>
          <td><span class="badge ${
            r.status==='Draft'?'badge-secondary':
            r.status==='Sent'?'badge-info':
            r.status==='Quotations Received'?'badge-warning':
            r.status==='Under Review'?'badge-warning':'badge-success'
          }">${r.status}</span></td>
          <td class="actions-cell">${actions}</td>
        `;
      };

      rfqPagerInstance = new TablePager(displayRfqs, 'rfqs-tbody', renderRow, 10);
      rfqPagerInstance.render();

      setupTableSorting('rfqs-table-element', displayRfqs, rfqPagerInstance);
      highlightSearchTerms('rfqs-tbody', 'rfq-search');

      // Filter handling
      const filterRfqStatus = document.getElementById('filter-rfq-status');
      filterRfqStatus.addEventListener('change', () => {
        let list = [...displayRfqs];
        if (filterRfqStatus.value !== 'All') {
          list = list.filter(r => r.status === filterRfqStatus.value);
        }
        rfqPagerInstance.updateData(list);
      });

      // Check query parameter trigger
      if (params && params.new === 'true') {
        showCreateRFQForm();
      }
    }

      document.querySelector('.card').classList.add('d-none');

      rfqFormBox.classList.remove('d-none');

    function editRFQDetails(id) {
      const rfqs = DB.get('vb_rfqs') || [];
      const rfq = rfqs.find(r => r.id === id);
      if (!rfq) return;

      showCreateRFQForm();
      document.getElementById('rfq-form-title').textContent = 'Edit Request for Quotation';
      document.getElementById('rfq-edit-id').value = rfq.id;
      document.getElementById('rfq-title').value = rfq.title;
      document.getElementById('rfq-desc').value = rfq.description || '';
      
      // Set deadline input in YYYY-MM-DD
      const dateObj = new Date(rfq.deadline);
      const year = dateObj.getFullYear();
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const day = String(dateObj.getDate()).padStart(2, '0');
      document.getElementById('rfq-deadline').value = `${year}-${month}-${day}`;

      // Populate items
      const container = document.getElementById('rfq-items-rows');
      container.innerHTML = '';
      rfq.items.forEach(it => {
        addRFQItemRow(it);
      });

      // Set checklist checked
      const checkboxes = document.querySelectorAll('input[name="invited-vendors"]');
      checkboxes.forEach(cb => {
        if (rfq.invitedVendors.includes(cb.value)) {
          cb.checked = true;
        }
      });
    }

    function hideRFQForm() {
      document.getElementById('rfq-form-container').classList.add('d-none');
      document.querySelector('.card').classList.remove('d-none');
    }

    function saveRFQSubmit(statusType) {
      const session = DB.get('vb_session');
      const id = document.getElementById('rfq-edit-id').value;
      const title = document.getElementById('rfq-title').value.trim();
      const desc = document.getElementById('rfq-desc').value.trim();
      const deadlineVal = document.getElementById('rfq-deadline').value;

      if (!title || !deadlineVal) {
        showToast('Please fill all required fields.', 'error');
        return;
      }

      // Check future date
      const deadlineDate = new Date(deadlineVal);
      if (deadlineDate <= new Date()) {
        showToast('Deadline must be a date in the future.', 'error');
        return;
      }

      // Read Items
      const itemRows = document.querySelectorAll('.dynamic-row');
      const items = [];
      let itemsValid = true;

      itemRows.forEach(row => {
        const name = row.querySelector('.item-name').value.trim();
        const qty = parseInt(row.querySelector('.item-qty').value);
        const unit = row.querySelector('.item-unit').value.trim();
        const est = parseFloat(row.querySelector('.item-est').value);

        if (!name || isNaN(qty) || qty <= 0 || !unit || isNaN(est)) {
          itemsValid = false;
        }
        items.push({
          id: 'item_' + Date.now() + Math.random().toString(36).substr(2, 5),
          name, qty, unit, estPrice: est
        });
      });

      if (!itemsValid || items.length === 0) {
        showToast('Please specify valid line items with quantity & estimated price.', 'error');
        return;
      }

      // Read selected vendors
      const checkboxes = document.querySelectorAll('input[name="invited-vendors"]:checked');
      const invitedVendors = Array.from(checkboxes).map(cb => cb.value);

      if (invitedVendors.length === 0) {
        showToast('Please select at least 1 active vendor to invite.', 'error');
        return;
      }

      let dbRfqs = DB.get('vb_rfqs') || [];
      
      if (id) {
        // Edit Mode
        const idx = dbRfqs.findIndex(r => r.id === id);
        if (idx !== -1) {
          dbRfqs[idx] = {
            ...dbRfqs[idx],
            title,
            description: desc,
            deadline: formatDate(deadlineVal),
            invitedVendors,
            items,
            status: statusType
          };
          DB.set('vb_rfqs', dbRfqs);
          DB.log(session.email, 'RFQ', `Updated RFQ: ${dbRfqs[idx].rfqNumber} — ${title}`);
          showToast(`RFQ ${dbRfqs[idx].rfqNumber} saved as ${statusType} successfully!`, 'success');
          
          if (statusType === 'Sent') {
            // Send updated emails in-app
            const vendors = DB.get('vb_vendors') || [];
            invitedVendors.forEach(vid => {
              const v = vendors.find(item => item.id === vid);
              if (v && v.email) {
                const mailBody = `Dear ${v.contactPerson},\n\nThis is an update regarding the RFQ you were invited to:\n\n` +
                  `Title: ${title}\n` +
                  `Ref No: ${dbRfqs[idx].rfqNumber}\n` +
                  `Deadline: ${formatDate(deadlineVal)}\n` +
                  `Description: ${desc || 'N/A'}\n\n` +
                  `Please log in to the VendorBridge portal to review the updated details and submit/edit your quotation.\n\n` +
                  `Best regards,\n` +
                  `Procurement Department\n` +
                  `VendorBridge ERP`;
                DB.sendEmail(v.email, session.email, `RFQ Update: ${title} (${dbRfqs[idx].rfqNumber})`, mailBody);
              }
            });
          }
        }
      } else {
        // Create Mode
        const rfqNum = 'RFQ-2026-' + String(dbRfqs.length + 1).padStart(4, '0');
        const newRfq = {
          id: 'rfq_' + Date.now(),
          rfqNumber: rfqNum,
          title,
          description: desc,
          deadline: formatDate(deadlineVal),
          createdBy: session.email,
          invitedVendors,
          status: statusType,
          items,
          attachments: ['specs_attachment.pdf']
        };
        dbRfqs.push(newRfq);
        DB.set('vb_rfqs', dbRfqs);
        DB.log(session.email, 'RFQ', `Created RFQ: ${rfqNum} — ${title} (${statusType})`);
        
        if (statusType === 'Sent') {
          showToast(`RFQ ${rfqNum} sent to ${invitedVendors.length} vendors successfully!`, 'success');
          
          // Send invite emails in-app
          const vendors = DB.get('vb_vendors') || [];
          invitedVendors.forEach(vid => {
            const v = vendors.find(item => item.id === vid);
            if (v && v.email) {
              const mailBody = `Dear ${v.contactPerson},\n\nYou have been invited to submit a quotation for a new RFQ:\n\n` +
                `Title: ${title}\n` +
                `Ref No: ${rfqNum}\n` +
                `Deadline: ${formatDate(deadlineVal)}\n` +
                `Description: ${desc || 'N/A'}\n\n` +
                `Please log in to the VendorBridge portal to view details and submit your quotation pricing.\n\n` +
                `Best regards,\n` +
                `Procurement Department\n` +
                `VendorBridge ERP`;
              DB.sendEmail(v.email, session.email, `Invitation to Bid: ${title} (${rfqNum})`, mailBody);
            }
          });
        } else {
          showToast(`RFQ ${rfqNum} saved as draft successfully!`, 'success');
        }
      }

      hideRFQForm();
      renderRFQs();
    }

    function deleteRFQ(id) {
      const rfqs = DB.get('vb_rfqs') || [];
      const r = rfqs.find(item => item.id === id);
      if (!r) return;

      if (confirm(`Are you sure you want to delete RFQ "${r.rfqNumber}"?`)) {
        const session = DB.get('vb_session');
        const list = rfqs.filter(item => item.id !== id);
        DB.set('vb_rfqs', list);
        DB.log(session.email, 'RFQ', `Deleted RFQ: ${r.rfqNumber}`);
        showToast('RFQ deleted successfully!', 'warning');
        renderRFQs();
      }
    }

      const rfqs = DB.get('vb_rfqs') || [];
      const r = rfqs.find(item => item.id === rfqId);
      if (!r) return;

      // Show large overlay modal to submit quotation

      if (!quoteModal) {
        quoteModal = document.createElement('div');
        quoteModal.id = 'quote-submit-modal';
        quoteModal.className = 'modal-overlay';
        document.body.appendChild(quoteModal);
      }

      quoteModal.innerHTML = `
        <div class="modal-container modal-lg">
          <div class="modal-header">

      openModal('quote-submit-modal');

      const form = document.getElementById('quote-submission-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const vendors = DB.get('vb_vendors') || [];
        const vendor = vendors.find(v => v.email === session.email);
        if (!vendor) {
          showToast('Failed to identify associated vendor entity.', 'error');
          return;
        }

        // Loop rows to assemble pricing
        const rows = document.querySelectorAll('.quote-item-row');
        const items = [];
        let valid = true;

        rows.forEach(row => {
          const itemId = row.getAttribute('data-item-id');
          const qty = parseInt(row.getAttribute('data-qty'));
          const priceInput = row.querySelector('.quote-unit-price');
          const delInput = row.querySelector('.quote-delivery');

          const unitPrice = parseFloat(priceInput.value);
          const deliveryDays = parseInt(delInput.value);

          if (isNaN(unitPrice) || unitPrice <= 0 || isNaN(deliveryDays) || deliveryDays <= 0) {
            valid = false;
          }

          items.push({
            itemId,
            unitPrice,
            totalPrice: unitPrice * qty,
            deliveryDays
          });
        });

        if (!valid) {
          showToast('Please enter valid quotation price and delivery days for all items.', 'error');
          return;
        }

        const validityDays = parseInt(document.getElementById('quote-validity').value);
        const notes = document.getElementById('quote-notes').value.trim();
        const terms = document.getElementById('quote-terms').value.trim();

        const dbQuotes = DB.get('vb_quotations') || [];
        const quoteId = 'q_' + Date.now();
        const newQuote = {
          id: quoteId,
          rfqId: r.id,
          vendorId: vendor.id,
          items,
          notes,
          terms,
          validityDays,
          status: 'Submitted',
          submittedAt: formatDateTime(new Date())
        };

        dbQuotes.push(newQuote);
        DB.set('vb_quotations', dbQuotes);

        // Update RFQ status to Quotations Received if >= 2 quotations
        const rfqQuotesCount = dbQuotes.filter(q => q.rfqId === r.id).length;
        if (rfqQuotesCount >= 2 && r.status === 'Sent') {
          const dbRfqs = DB.get('vb_rfqs') || [];
          const rfqIdx = dbRfqs.findIndex(item => item.id === r.id);
          if (rfqIdx !== -1) {
            dbRfqs[rfqIdx].status = 'Quotations Received';
            DB.set('vb_rfqs', dbRfqs);
          }
        }

        DB.log(session.email, 'Quotation', `Submitted Quotation for RFQ: ${r.rfqNumber} (${formatCurrency(newQuote.items.reduce((acc, it) => acc + it.totalPrice, 0))})`);
        showToast('Your quotation has been submitted successfully!', 'success');
        closeModal('quote-submit-modal');
        renderQuotations();
      });
    }

    function editQuotation(quoteId) {
      const quotes = DB.get('vb_quotations') || [];
      const q = quotes.find(item => item.id === quoteId);
      if (!q) return;

      submitQuotationForm(q.rfqId);

      // Pre-fill values
      const rows = document.querySelectorAll('.quote-item-row');
      rows.forEach(row => {
        const itemId = row.getAttribute('data-item-id');
        const qItem = q.items.find(it => it.itemId === itemId);
        if (qItem) {
          row.querySelector('.quote-unit-price').value = qItem.unitPrice;
          row.querySelector('.quote-delivery').value = qItem.deliveryDays;
        }
      });

      document.getElementById('quote-validity').value = q.validityDays;
      document.getElementById('quote-notes').value = q.notes || '';
      document.getElementById('quote-terms').value = q.terms || '';

      // Modify form submission to overwrite rather than append
      const form = document.getElementById('quote-submission-form');
      // Remove old listener by cloning form
      const newForm = form.cloneNode(true);
      form.parentNode.replaceChild(newForm, form);

      newForm.addEventListener('submit', (e) => {
        e.preventDefault();
        
        const updatedQuotes = DB.get('vb_quotations') || [];
        const qIndex = updatedQuotes.findIndex(item => item.id === quoteId);
        if (qIndex === -1) return;

        const updatedItems = [];
        let valid = true;
        const formRows = document.querySelectorAll('.quote-item-row');
        formRows.forEach(row => {
          const itemId = row.getAttribute('data-item-id');
          const qty = parseInt(row.getAttribute('data-qty'));
          const priceInput = row.querySelector('.quote-unit-price');
          const delInput = row.querySelector('.quote-delivery');

          const unitPrice = parseFloat(priceInput.value);
          const deliveryDays = parseInt(delInput.value);

          if (isNaN(unitPrice) || unitPrice <= 0 || isNaN(deliveryDays) || deliveryDays <= 0) {
            valid = false;
          }

          updatedItems.push({
            itemId,
            unitPrice,
            totalPrice: unitPrice * qty,
            deliveryDays
          });
        });

        if (!valid) {
          showToast('Please enter valid pricing and delivery timelines.', 'error');

        }

        updatedQuotes[qIndex].items = updatedItems;
        updatedQuotes[qIndex].validityDays = parseInt(document.getElementById('quote-validity').value);
        updatedQuotes[qIndex].notes = document.getElementById('quote-notes').value.trim();

        DB.set('vb_quotations', updatedQuotes);
        DB.log(DB.get('vb_session').email, 'Quotation', `Updated Quotation for RFQ.`);

        closeModal('quote-submit-modal');
        renderQuotations();
      });

    // ----------------------------------------------------
    // SCREEN 6: QUOTATION COMPARISON (MOST IMPORTANT SCREEN)
    // ----------------------------------------------------
    function renderQuotationComparison(params) {
      const rfqId = params.id;
      if (!rfqId) {
        Router.navigate('#/rfqs');
        return;
      }

      const rfqs = DB.get('vb_rfqs') || [];
      const rfq = rfqs.find(r => r.id === rfqId);
      if (!rfq) {
        Router.navigate('#/rfqs');
        return;
      }

      const vendors = DB.get('vb_vendors') || [];
      const quotations = DB.get('vb_quotations') || [];
      
      // Filter quotes for this RFQ
      const rfqQuotes = quotations.filter(q => q.rfqId === rfq.id);
      if (rfqQuotes.length < 2) {
        showToast('At least 2 vendor quotations are required to view the Comparison Matrix.', 'warning');
        Router.navigate('#/rfqs');
        return;
      }

      // Calculate best values
      let lowestPrice = Infinity;
      let fastestDelivery = Infinity;

      const quotesCalculated = rfqQuotes.map(q => {
        const vendor = vendors.find(v => v.id === q.vendorId) || { name: 'Deleted Vendor', rating: 3 };
        const totalPrice = q.items.reduce((acc, it) => acc + it.totalPrice, 0);
        const deliveryDays = q.items[0].deliveryDays; // Assume first item delivery represents the bid
        
        if (totalPrice < lowestPrice) lowestPrice = totalPrice;
        if (deliveryDays < fastestDelivery) fastestDelivery = deliveryDays;

        return {
          q,
          vendor,
          totalPrice,
          deliveryDays,
          validity: q.validityDays,
          notes: q.notes || 'None',
          rating: vendor.rating || 4.0
        };
      });

      // Calculate max validity for score scaling
      const maxValidity = Math.max(...quotesCalculated.map(qc => qc.validity));

      // Calculate Scores: 40% Price, 35% Delivery, 15% Validity, 10% Rating
      let bestOverallScore = -1;
      let recommendedVendorName = '';

      const scoredVendors = quotesCalculated.map(qc => {
        // Price score: lowest price gets 40, else scaled inversely
        const priceScore = lowestPrice === qc.totalPrice ? 40 : 40 * (lowestPrice / qc.totalPrice);
        // Delivery score: fastest delivery gets 35, else scaled
        const deliveryScore = fastestDelivery === qc.deliveryDays ? 35 : 35 * (fastestDelivery / qc.deliveryDays);
        // Validity score: scaled based on max validity
        const validityScore = 15 * (qc.validity / maxValidity);
        // Rating score: scaled based on max 5 stars
        const ratingScore = 10 * (qc.rating / 5);

        const totalScore = Math.round(priceScore + deliveryScore + validityScore + ratingScore);

        if (totalScore > bestOverallScore) {
          bestOverallScore = totalScore;
          recommendedVendorName = qc.vendor.name;
        }

        return {
          ...qc,
          priceScore,
          deliveryScore,
          validityScore,
          ratingScore,
          totalScore
        };
      });

      const html = `
        <div class="compare-container">
          <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2 style="color:var(--primary-purple); font-weight:700;">Quotation Comparison Matrix</h2>
            <button class="btn btn-secondary btn-sm" onclick="Router.navigate('#/rfqs')">← Back to RFQs</button>
          </div>

          <div class="card" style="margin-bottom:0;">
            <div class="card-header" style="background-color:#f8f9fa;">
              <h3 class="card-title">RFQ Title: <b>${rfq.title}</b> (${rfq.rfqNumber})</h3>
            </div>
            
            <div class="compare-table-wrapper">
              <table class="compare-table">
                <thead>
                  <tr>
                    <th>Comparison Criteria</th>
                    ${scoredVendors.map(sv => `<th>${sv.vendor.name}</th>`).join('')}
                  </tr>
                </thead>
                <tbody>
                  <tr>
                    <td><b>Total Quoted Price</b></td>
                    ${scoredVendors.map(sv => `
                      <td class="${sv.totalPrice === lowestPrice ? 'best-price-cell' : ''}">
                        <b>${formatCurrency(sv.totalPrice)}</b>
                        ${sv.totalPrice === lowestPrice ? '<br/><span class="badge badge-success">✅ Best Price</span>' : ''}
                      </td>
                    `).join('')}
                  </tr>
                  <tr>
                    <td><b>Delivery Timeline</b></td>
                    ${scoredVendors.map(sv => `
                      <td class="${sv.deliveryDays === fastestDelivery ? 'best-delivery-cell' : ''}">
                        ${sv.deliveryDays} Days
                        ${sv.deliveryDays === fastestDelivery ? '<br/><span class="badge badge-info">⚡ Fastest</span>' : ''}
                      </td>
                    `).join('')}
                  </tr>
                  <tr>
                    <td><b>Validity Period</b></td>
                    ${scoredVendors.map(sv => `<td>${sv.validity} Days</td>`).join('')}
                  </tr>
                  <tr>
                    <td><b>Vendor Trust Rating</b></td>
                    ${scoredVendors.map(sv => `<td>${sv.rating} / 5.0 ★</td>`).join('')}
                  </tr>
                  <tr>
                    <td><b>Additional Notes</b></td>
                    ${scoredVendors.map(sv => `<td style="font-size:0.8rem; text-align:left;">${sv.notes}</td>`).join('')}
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

          <!-- AUTOMATED SCORING PANEL -->
          <div class="scoring-section">
            <h3 style="color:var(--primary-purple); margin-bottom:1rem; border-bottom:1px solid #eee; padding-bottom:0.5rem; font-weight:700;">
              Score Sheet & Multi-Criteria Evaluation (MCE)
            </h3>
            
            <div class="winner-box" style="margin-bottom:1.5rem;">
              <div class="winner-icon">🏆</div>
              <div class="winner-details">
                <h4>Recommended Winner: ${recommendedVendorName}</h4>
                <p>Based on automated Multi-Criteria Evaluation using: 40% Price, 35% Delivery, 15% Bid Validity, and 10% Historical Vendor Rating. Best score of <b>${bestOverallScore}/100</b>.</p>
              </div>
            </div>

            <div class="scoring-grid">
              ${scoredVendors.map(sv => `
                <div class="score-card">
                  <div class="score-title">
                    <span>${sv.vendor.name}</span>
                    <span class="badge ${sv.totalScore === bestOverallScore ? 'badge-success' : 'badge-secondary'}">${sv.totalScore} / 100 Pts</span>
                  </div>
                  <div class="score-item">
                    Price Fit (40%): ${Math.round(sv.priceScore)} Pts
                    <div class="score-bar-bg"><div class="score-bar-fill" style="width: ${sv.priceScore * 2.5}%;"></div></div>
                  </div>
                  <div class="score-item">
                    Delivery Speed (35%): ${Math.round(sv.deliveryScore)} Pts
                    <div class="score-bar-bg"><div class="score-bar-fill" style="width: ${sv.deliveryScore * 2.8}%;"></div></div>
                  </div>
                  <div class="score-item">
                    Validity Period (15%): ${Math.round(sv.validityScore)} Pts
                    <div class="score-bar-bg"><div class="score-bar-fill" style="width: ${sv.validityScore * 6.6}%;"></div></div>
                  </div>
                  <div class="score-item">
                    Vendor Rating (10%): ${Math.round(sv.ratingScore)} Pts
                    <div class="score-bar-bg"><div class="score-bar-fill" style="width: ${sv.ratingScore * 10}%;"></div></div>
                  </div>

                  <button class="btn btn-primary" style="width:100%; margin-top: 1.5rem;" onclick="initiateProcurementApproval('${rfq.id}', '${sv.vendor.id}', ${sv.totalPrice})">
                    Select & Initiate Approval
                  </button>
                </div>
              `).join('')}
            </div>
          </div>
        </div>
      `;

      const root = document.getElementById('app-root');
      root.innerHTML = getLayoutWrapper('Quotation Analysis', html);
      updateSidebarActive();
    }

    function initiateProcurementApproval(rfqId, vendorId, amount) {
      const session = DB.get('vb_session');
      const rfqs = DB.get('vb_rfqs') || [];
      const rfq = rfqs.find(r => r.id === rfqId);
      if (!rfq) return;

      const vendors = DB.get('vb_vendors') || [];
      const vendor = vendors.find(v => v.id === vendorId) || { name: 'Unknown' };

      if (confirm(`Do you want to award the contract to "${vendor.name}" for ${formatCurrency(amount)} and initiate Manager Approval Workflow?`)) {
        // Update RFQ status to Under Review
        rfq.status = 'Under Review';
        DB.set('vb_rfqs', rfqs);

        // Add Approval record
        const approvals = DB.get('vb_approvals') || [];
        const newApproval = {
          id: 'app_' + Date.now(),
          rfqId: rfq.id,
          vendorId,
          amount,
          submittedBy: session.name,
          submittedDate: formatDate(new Date()),
          level: 2, // Pending level 2 Manager Approval
          status: 'Pending',
          remarks: '',
          history: [
            { level: 1, action: 'Approved', user: session.email, remarks: 'Initiated approval from Quotation Comparison Matrix recommendations.', date: formatDate(new Date()) }
          ]
        };

        approvals.push(newApproval);
        DB.set('vb_approvals', approvals);

        DB.log(session.email, 'Approval', `Initiated Procurement Approval Workflow for RFQ: ${rfq.rfqNumber} awarding to ${vendor.name}.`);
        showToast('Approval workflow initiated successfully! Sent to Manager.', 'success');
        Router.navigate('#/rfqs');
      }
    }

    function processApprovalAction(approvalId, actionType) {
      const session = DB.get('vb_session');
      const approvals = DB.get('vb_approvals') || [];
      const appIndex = approvals.findIndex(a => a.id === approvalId);
      if (appIndex === -1) return;

      const remarksVal = document.getElementById(`remarks-${approvalId}`).value.trim();
      const reqIndicator = document.getElementById(`remarks-required-${approvalId}`);

      if (actionType === 'Reject' && !remarksVal) {
        reqIndicator.style.display = 'inline';
        showToast('Review Remarks are strictly required for rejection.', 'error');
        return;
      }

      if (confirm(`Are you sure you want to ${actionType} this procurement request?`)) {
        const approvalObj = approvals[appIndex];
        approvalObj.status = actionType === 'Approve' ? 'Approved' : 'Rejected';
        approvalObj.remarks = remarksVal;
        approvalObj.history.push({
          level: 2,
          action: actionType === 'Approve' ? 'Approved' : 'Rejected',
          user: session.email,
          remarks: remarksVal,
          date: formatDate(new Date())
        });

        // Update RFQ status
        const rfqs = DB.get('vb_rfqs') || [];
        const rfqIdx = rfqs.findIndex(r => r.id === approvalObj.rfqId);
        if (rfqIdx !== -1) {
          rfqs[rfqIdx].status = actionType === 'Approve' ? 'Closed' : 'Sent'; // Revert back to sent if rejected for rebidding
          DB.set('vb_rfqs', rfqs);
        }

        DB.set('vb_approvals', approvals);
        DB.log(session.email, 'Approval', `Procurement Audit: ${actionType} for RFQ Award.`);

        showToast(`Request has been successfully ${actionType}d!`, actionType === 'Approve' ? 'success' : 'warning');

        if (actionType === 'Reject') {
          // Send rejection email to procurement officer
          const rfqs = DB.get('vb_rfqs') || [];
          const rfq = rfqs.find(r => r.id === approvalObj.rfqId);
          const mailSubject = `RFQ Award Audit: Rejected - ${rfq ? rfq.rfqNumber : ''}`;
          const mailBody = `Hello Procurement Team,\n\n` +
            `This is to notify you that the procurement award for RFQ: ${rfq ? rfq.title : ''} (${rfq ? rfq.rfqNumber : ''}) has been Rejected by Manager ${session.name}.\n\n` +
            `Remarks: ${remarksVal || 'No additional remarks.'}\n\n` +
            `The RFQ status has been reset to Sent for potential rebidding or review.\n\n` +
            `Best regards,\n` +
            `System Audit Notifications`;
          DB.sendEmail('officer@vendorbridge.com', session.email, mailSubject, mailBody);
        }
        
        // If approved, offer to auto-generate PO
        if (actionType === 'Approve') {
          // Generate PO automatically in draft
          const pos = DB.get('vb_pos') || [];
          const poId = 'po_' + Date.now();
          const poNumber = 'PO-2026-' + String(pos.length + 1).padStart(4, '0');
          const subtotal = approvalObj.amount;
          const gst = Math.round(subtotal * 0.18);
          const total = subtotal + gst;

          const newPO = {
            id: poId,
            poNumber,
            rfqId: approvalObj.rfqId,
            vendorId: approvalObj.vendorId,
            amount: subtotal,
            gst,
            total,
            createdDate: formatDate(new Date()),
            status: 'Confirmed' // Seed confirmed state
          };

          pos.push(newPO);
          DB.set('vb_pos', pos);
          DB.log(session.email, 'RFQ', `Auto-generated Confirmed Purchase Order: ${poNumber} for awarded vendor.`);

          // Send PO notification email to vendor in-app
          const vendors = DB.get('vb_vendors') || [];
          const vendor = vendors.find(v => v.id === approvalObj.vendorId);
          if (vendor) {
            const body = `Dear ${vendor.contactPerson},\n\n` +
              `We are pleased to inform you that your quotation has been approved and awarded for RFQ: ${poNumber}.\n\n` +
              `Confirmed Purchase Order ${poNumber} has been generated.\n\n` +
              `Total Amount: ${formatCurrency(total)} (Subtotal: ${formatCurrency(subtotal)} + GST 18%: ${formatCurrency(gst)})\n\n` +
              `Please log in to the VendorBridge portal to confirm delivery schedule.\n\n` +
              `Best regards,\n` +
              `Procurement Department\n` +
              `VendorBridge ERP`;
            DB.sendEmail(vendor.email, 'officer@vendorbridge.com', `Purchase Order Confirmed: ${poNumber}`, body);
          }
          showToast(`Purchase Order ${poNumber} generated successfully!`, 'info');
        }

        renderApprovals();
      }
    }

    function generateInvoiceFromPO(poId) {
      const pos = DB.get('vb_pos') || [];
      const po = pos.find(p => p.id === poId);
      if (!po) return;

      const invoices = DB.get('vb_invoices') || [];
      const session = DB.get('vb_session');

      const invNumber = 'INV-2026-' + String(invoices.length + 1).padStart(3, '0');
      
      const createdDateObj = new Date();
      const dueDateObj = new Date();
      dueDateObj.setDate(dueDateObj.getDate() + 30); // Net 30 days

      const newInv = {
        id: 'inv_' + Date.now(),
        invoiceNumber: invNumber,
        poId: po.id,
        vendorId: po.vendorId,
        amount: po.amount,
        gst: po.gst,
        total: po.total,
        createdDate: formatDate(createdDateObj),
        dueDate: formatDate(dueDateObj),
        status: 'Sent'
      };

      invoices.push(newInv);
      DB.set('vb_invoices', invoices);

      DB.log(session.email, 'Invoice', `Generated Invoice: ${invNumber} from Purchase Order: ${po.poNumber}`);
      showToast(`Invoice ${invNumber} generated successfully!`, 'success');
      Router.navigate('#/invoices');
    }

    function updateMailboxBadge() {
      const session = DB.get('vb_session');
      if (!session) return;
      
      const emails = DB.get('vb_emails') || [];
      const userEmails = emails.filter(e => e.to.toLowerCase() === session.email.toLowerCase());
      const unreadCount = userEmails.filter(e => !e.read).length;
      
      const badge = document.getElementById('sidebar-mail-unread');
      if (badge) {
        if (unreadCount > 0) {
          badge.textContent = unreadCount;
          badge.classList.remove('d-none');
        } else {
          badge.classList.add('d-none');
        }
      }
    }

    function selectEmail(emailId) {
      const emails = DB.get('vb_emails') || [];
      const idx = emails.findIndex(e => e.id === emailId);
      if (idx === -1) return;

      // Mark as read
      emails[idx].read = true;
      DB.set('vb_emails', emails);

      // Re-update the unread badge in sidebar
      updateMailboxBadge();

      // Style selected item in left panel
      const items = document.querySelectorAll('.email-list-item');
      items.forEach(it => {
        const id = it.getAttribute('data-email-id');
        const originalEmail = emails.find(em => em.id === id);
        if (id === emailId) {
          it.style.backgroundColor = '#e2f0fe';
          it.style.fontWeight = 'normal';
          const indicator = it.querySelector('span[style*="background-color"]');
          if (indicator) indicator.remove();
        } else {
          it.style.backgroundColor = originalEmail && originalEmail.read ? '#fff' : '#f0f7ff';
          it.style.fontWeight = originalEmail && originalEmail.read ? 'normal' : '500';
        }
      });

      // Render details on the right panel
      const email = emails[idx];
      const detailPane = document.getElementById('email-detail-pane');
      detailPane.innerHTML = `
        <div style="border-bottom: 1px solid var(--border-color); padding-bottom: 1.5rem; margin-bottom: 1.5rem;">

            </div>
            <div style="text-align:right; color:var(--text-muted);">
              <p>${email.timestamp}</p>
            </div>
          </div>
        </div>
        <div style="font-size:0.95rem; line-height:1.6; white-space:pre-line; color:#333; background-color:#fff; border:1px solid var(--border-color); border-radius:4px; padding:2rem; box-shadow:var(--shadow-sm); overflow-y:auto; max-height:calc(100% - 120px);">

      const root = document.getElementById('app-root');
      root.innerHTML = getLayoutWrapper('Audit Trails & Logs', html);
      updateSidebarActive();

      const timelineBox = document.getElementById('timeline-box');
      
      const renderTimeline = (list) => {
        timelineBox.innerHTML = '';
        if (list.length === 0) {
          timelineBox.innerHTML = '<div class="text-center text-muted" style="padding:3rem 0;">No log entries matches filter.</div>';
          return;
        }

        list.forEach(l => {
          let dotColor = '#ced4da';
          if (l.type === 'RFQ') dotColor = 'var(--info-blue)';
          else if (l.type === 'Quotation') dotColor = 'var(--warning-orange)';
          else if (l.type === 'Approval') dotColor = 'var(--success-green)';
          else if (l.type === 'Invoice') dotColor = 'var(--danger-red)';
          else if (l.type === 'User') dotColor = 'var(--primary-purple)';
          
          timelineBox.innerHTML += `
            <div class="timeline-item">
              <span class="timeline-item-icon" style="border-color: ${dotColor};"></span>
              <div class="timeline-item-content">
                <div class="timeline-item-meta">
                  <span><b>User:</b> ${l.user}</span>
                  <span>${l.timestamp}</span>
                </div>
                <div class="timeline-item-desc">
                  <span class="badge" style="background-color: ${dotColor}; color: white; margin-right: 0.5rem;">${l.type}</span>
                  ${l.actionDescription}
                </div>
              </div>
            </div>
          `;
        });
      };

      // Initial load
      renderTimeline(logs);

      // Search & Filters
      const logSearch = document.getElementById('log-search');
      const logFilter = document.getElementById('filter-log-type');

      const applyLogFilters = () => {
        let list = DB.get('vb_logs') || [];
        const term = logSearch.value.trim().toLowerCase();
        const type = logFilter.value;

        if (type !== 'All') {
          list = list.filter(l => l.type === type);
        }
        if (term) {
          list = list.filter(l => 
            l.user.toLowerCase().includes(term) || 
            l.actionDescription.toLowerCase().includes(term) ||
            l.type.toLowerCase().includes(term)
          );
        }
        renderTimeline(list);
      };

      logSearch.addEventListener('input', applyLogFilters);
      logFilter.addEventListener('change', applyLogFilters);
    }

    function markAllNotificationsRead() {
      const box = document.getElementById('notification-box');
      if (box) {
        box.innerHTML = '<div class="text-center text-muted" style="padding: 1.5rem;">All notifications marked as read.</div>';
      }
      showToast('All notifications cleared.', 'info');
    }

    function exportLogsCSV() {
      const logs = DB.get('vb_logs') || [];
      let csvContent = "data:text/csv;charset=utf-8,ID,Timestamp,User,Event Type,Description\n";
      
      logs.forEach(l => {
        const row = [
          l.id,
          l.timestamp,
          l.user,
          l.type,
          `"${l.actionDescription.replace(/"/g, '""')}"`
        ].join(",");
        csvContent += row + "\n";
      });

      const encodedUri = encodeURI(csvContent);
      const link = document.createElement("a");
      link.setAttribute("href", encodedUri);
      link.setAttribute("download", `vendorbridge_activity_logs_${Date.now()}.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      showToast('Activity logs CSV generated and downloaded!', 'success');
    }

    Router.add('#/logs', renderLogs);

    let userPagerInstance = null;

      const users = DB.get('vb_users') || [];
      const session = DB.get('vb_session');

      const html = `

        <div class="modal-overlay" id="user-modal">
          <div class="modal-container">
            <div class="modal-header">
              <h3 class="modal-title" id="user-modal-title">Add User Account</h3>
              <button class="modal-close" onclick="closeModal('user-modal')">&times;</button>
            </div>
            <form id="user-form">
              <input type="hidden" id="user-edit-id" />
              <div class="modal-body">
                <div class="form-group">
                  <label class="form-label">Full Name <span class="required">*</span></label>
                  <input type="text" id="user-name" class="form-control" placeholder="John Doe" required />

                </div>
                <div class="form-group">
                  <label class="form-label">Password <span class="required">*</span></label>
                  <input type="password" id="user-password" class="form-control" placeholder="••••••••" required />
                </div>
                <div class="form-group">

                  <label class="form-checkbox-label">

                  </label>
                </div>
              </div>
              <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeModal('user-modal')">Cancel</button>
                <button type="submit" class="btn btn-primary">Save User</button>
              </div>
            </form>
          </div>
        </div>
      `;

      const root = document.getElementById('app-root');
      root.innerHTML = getLayoutWrapper('System User Directory', html);
      updateSidebarActive();

      const renderRow = (u) => {
        let badgeColor = 'badge-secondary';
        if (u.role === 'Admin') badgeColor = 'badge-danger';
        else if (u.role === 'Procurement Officer') badgeColor = 'badge-info';
        else if (u.role === 'Vendor') badgeColor = 'badge-success';
        else if (u.role === 'Manager') badgeColor = 'badge-warning';

        return `
          <td><b>${u.name}</b></td>
          <td>${u.email}</td>
          <td><span class="badge ${badgeColor}">${u.role}</span></td>
          <td><span class="badge ${u.status === 'Active' ? 'badge-success' : 'badge-secondary'}">${u.status}</span></td>
          <td>${u.lastLogin || 'Never logged in'}</td>
          <td class="actions-cell">
            <button class="btn btn-outline btn-sm" onclick="editUser('${u.id}')">✏️ Edit</button>
            <button class="btn btn-outline btn-sm" onclick="toggleUserStatus('${u.id}')">${u.status === 'Active' ? 'Deactivate' : 'Activate'}</button>
            <button class="btn btn-danger btn-sm" onclick="resetUserPassword('${u.id}')">Reset Pass</button>
          </td>
        `;
      };

      userPagerInstance = new TablePager(users, 'users-tbody', renderRow, 10);
      userPagerInstance.render();

      setupTableSorting('users-table-element', users, userPagerInstance);
      highlightSearchTerms('users-tbody', 'user-search');

      const form = document.getElementById('user-form');
      form.addEventListener('submit', (e) => {
        e.preventDefault();

        const id = document.getElementById('user-edit-id').value;
        const name = document.getElementById('user-name').value.trim();
        const email = document.getElementById('user-email').value.trim().toLowerCase();
        const password = document.getElementById('user-password').value;
        const role = document.getElementById('user-role').value;
        const status = document.getElementById('user-status-toggle').checked ? 'Active' : 'Inactive';

        let dbUsers = DB.get('vb_users') || [];

        if (id) {
          const index = dbUsers.findIndex(u => u.id === id);
          if (index !== -1) {
            dbUsers[index] = { ...dbUsers[index], name, email, password, role, status };
            DB.set('vb_users', dbUsers);
            DB.log(session.email, 'User', `Updated User profile: ${name} (${role})`);
            showToast('User account successfully updated!', 'success');
          }
        } else {
          // Check email existence
          if (dbUsers.some(u => u.email === email)) {
            showToast('This email is already in use by another user.', 'error');
            return;
          }
          const newUser = { id: 'u_' + Date.now(), name, email, password, role, status, lastLogin: '' };
          dbUsers.push(newUser);
          DB.set('vb_users', dbUsers);
          DB.log(session.email, 'User', `Created User account: ${name} (${role})`);
          showToast('New User account created successfully!', 'success');
        }

        closeModal('user-modal');
        renderUsers();
      });
    }

    function showAddUserModal() {
      document.getElementById('user-modal-title').textContent = 'Add User Account';
      document.getElementById('user-edit-id').value = '';
      document.getElementById('user-form').reset();
      document.getElementById('user-status-toggle').checked = true;
      openModal('user-modal');
    }

    function editUser(id) {
      const users = DB.get('vb_users') || [];
      const u = users.find(item => item.id === id);
      if (!u) return;

      document.getElementById('user-modal-title').textContent = 'Edit User Account';
      document.getElementById('user-edit-id').value = u.id;
      document.getElementById('user-name').value = u.name;
      document.getElementById('user-email').value = u.email;
      document.getElementById('user-password').value = u.password;
      document.getElementById('user-role').value = u.role;
      document.getElementById('user-status-toggle').checked = u.status === 'Active';

      openModal('user-modal');
    }

    function toggleUserStatus(id) {
      const users = DB.get('vb_users') || [];
      const idx = users.findIndex(item => item.id === id);
      if (idx === -1) return;

      const u = users[idx];
      if (u.email === DB.get('vb_session').email) {
        showToast('You cannot deactivate your own active session!', 'error');
        return;
      }

      const nextStatus = u.status === 'Active' ? 'Inactive' : 'Active';
      if (confirm(`Are you sure you want to change status of "${u.name}" to ${nextStatus}?`)) {
        u.status = nextStatus;
        DB.set('vb_users', users);
        DB.log(DB.get('vb_session').email, 'User', `Toggled User account active state for ${u.name}.`);
        showToast(`User account status set to ${nextStatus}!`, 'success');
        renderUsers();
      }
    }

    function resetUserPassword(id) {
      const users = DB.get('vb_users') || [];
      const idx = users.findIndex(item => item.id === id);
      if (idx === -1) return;

      const u = users[idx];
      const newPass = prompt(`Enter new password for ${u.name}:`, 'reset123');
      if (newPass) {
        u.password = newPass;
        DB.set('vb_users', users);
        DB.log(DB.get('vb_session').email, 'User', `Reset password for user account: ${u.name}`);
        showToast('Password reset successful!', 'success');
        renderUsers();
      }
    }

    Router.add('#/users', renderUsers, ['Admin']);
  </script>
